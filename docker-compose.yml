services:
  postgres:
    image: postgres:16-alpine
    container_name: oys_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: oys
      POSTGRES_USER: oys
      POSTGRES_PASSWORD: oys_password
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oys -d oys"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oys_app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Europe/Istanbul
    ports:
      - "3000:3000"

volumes:
  postgres_data:
